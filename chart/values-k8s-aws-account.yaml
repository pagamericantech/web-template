# Chart: https://github.com/pagamericantech/platform-charts/tree/main/platform-k8s-web-chart
#
# Override values pra deploy do __APP_NAME__ no cluster k8s-shared-services.
# `image.tag` é atualizado pelo workflow .github/workflows/build_and_deploy.yaml
# após cada build de main.

image:
  repository: 946819142358.dkr.ecr.us-east-1.amazonaws.com/__IMAGE_NAME__
  pullPolicy: IfNotPresent
  tag: "REPLACE_ME"
containerPort: 8080
labels:
  cost-center: k8s-aws-account
  env: production
  project: __APP_NAME__
  owner: __OWNER__
  support: __OWNER__
  github-org: pagamericantech
  github-repo: __APP_NAME__
annotations:
  documentation: https://github.com/pagamericantech/__APP_NAME__
application:
  name: __APP_NAME__
  language: __LANGUAGE__
  environment: production
# Node placement — NodePools `noncritical`/`critical` têm taint
# `workload=<name>:NoSchedule`, então precisa de label match (nodeSelector)
# E toleration ao mesmo tempo. nodepool é escolhido no bootstrap.
nodeSelector:
  workload: __NODEPOOL__
tolerations:
  - key: workload
    operator: Equal
    value: __NODEPOOL__
    effect: NoSchedule
cloudProviders:
  aws:
    enabled: true
    # IAM role da app (preencher com o ARN da role criada em platform-applications/aws/<env>/iam/__APP_NAME__).
    roleArn: ""
    # Pod Identity (eks-pod-identity-agent socket) — default pra novas apps.
    # Bypassa o webhook IRSA do EKS control plane (que travou em staging).
    # Requer `pod_identity_associations` na role IAM (binding cluster/ns/sa → role).
    usePodIdentity: true
    # Pull de ECR via IRSA/PodIdentity do namespace — não precisa de imagePullSecret.
    imagePullSecrets: {}
secrets:
  remoteKey: __APP_NAME__
  reloadEnabled: true # when set to true, after changing the secret the container is automatically restarted
  envVarEnabled: true # set it to true if you want to use env vars instead of mounting volumes
  loadAllKeys: true # set it to true if you want to load all keys automatically (without having to specify them)
  datadogRemoteKey: __DATADOG_REMOTE_KEY__
datadog:
  enabled: false
  # APM auto-instrumentation (Single-Step Instrumentation) — opt-in.
  # Quando `autoInstrument: true` E `datadog.enabled: true`, o pod ganha a
  # label `datadoghq.com/apm-instrumentation: "enabled"` no template, e o
  # Cluster Agent injeta automaticamente:
  #   - init container com a tracer lib da Datadog (java/python/js/dotnet)
  #   - env vars de bootstrap (JAVA_TOOL_OPTIONS, NODE_OPTIONS, etc.)
  #   - volume compartilhado com a lib
  # App não precisa adicionar `dd-trace-*` na image. Custo: ~3-8s extra no
  # pod startup + ~1-5% CPU runtime do tracer. Traces aparecem no APM
  # dashboard automaticamente após o rollout.
  # Vide https://docs.datadoghq.com/tracing/trace_collection/single-step-apm/kubernetes/
  apm:
    autoInstrument: false
# Autoscaling via KEDA (ScaledObject). CPU + memory são os triggers default —
# o chart também suporta kafka/sqs/rabbitmq/datadog (ver values.yaml do
# platform-k8s-web-chart pra schema completo de cada scaler).
autoscaling:
  enabled: true
  maxReplicas: 3
  cpu:
    # https://keda.sh/docs/2.9/scalers/cpu/
    target: "80"
    metricType: Utilization
  memory:
    # https://keda.sh/docs/2.9/scalers/memory/
    target: "80"
    metricType: Utilization
# Exposição via Envoy Gateway interno (ajuste pra `external` + sectionName
# correto se for hostname público em *.pagamerican.app / *.pagamerican.tech).
httpRoute:
  enabled: true
  servicePort: 8080
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - __APP_NAME__.k8s-aws-account.pagamerican.tech
healthcheck:
  livenessProbe:
    enabled: true
    path: /
    failureThreshold: 3
    periodSeconds: 20
    initialDelaySeconds: 15
    timeoutSeconds: 10
  readinessProbe:
    enabled: true
    path: /
    failureThreshold: 3
    periodSeconds: 20
    initialDelaySeconds: 15
    timeoutSeconds: 10
